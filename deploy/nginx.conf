worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    # Sendfile configuration
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Limit payload size explicitly (500MB as specified)
    client_max_body_size 500m;

    # Rate limiting zones
    # Upload zone: Strict limit on POSTs to /api/v1/models/upload
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
    
    # Generic API zone: Higher limit for GETs / statuses
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    
    # Basic SSL Settings (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Explicit Content Security Policy (MVP limit)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob:; connect-src 'self' wss:;" always;
    
    # Block framing
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Nginx Proxy definition
    server {
        listen 80;
        listen [::]:80;
        
        # Production traffic will be routed over HTTPS termination external to MVP scope,
        # but these headers operate regardless
        server_name _;

        # Explicit configuration for the primary uploads
        location /api/v1/models/upload {
            limit_req zone=upload burst=10 nodelay;
            proxy_pass http://backend:8000;
            
            # Forward real headers to the FastAPI Uvicorn ASGI server
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Any other API Traffic receives 100/min rules
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            proxy_pass http://backend:8000;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
    }
}
