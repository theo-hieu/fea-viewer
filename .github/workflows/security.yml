name: Security Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ----------------------------------------------------- #
      # Backend Scanning (pip-audit)
      # ----------------------------------------------------- #
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit on Backend
        run: pip-audit -r backend/requirements.txt
        # Fails the pipeline if vulnerable packages exist

      # ----------------------------------------------------- #
      # Frontend Scanning (npm audit)
      # ----------------------------------------------------- #
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit on Frontend
        working-directory: ./frontend
        run: npm ci && npm audit --audit-level=high
        # Fails the pipeline on high/critical vulnerabilities

      # ----------------------------------------------------- #
      # Container Scanning (trivy)
      # ----------------------------------------------------- #
      - name: Build Backend Image
        run: docker compose -f docker-compose.yml build api

      - name: Run Trivy vulnerability scanner on Backend container
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "fea-viewer-backend:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
