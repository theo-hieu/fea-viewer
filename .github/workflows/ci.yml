name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint backend
        run: >
          python -m ruff check
          app/api/v1/routes_models.py
          app/parsing/models.py
          app/parsing/vtk_parser.py
          app/tasks/parse_task.py
          tests/api/test_routes_models.py
          tests/tasks/test_parse_task.py
          tests/tasks/test_process_upload.py
          tests/parsing/test_vtu_error_handling.py

      - name: Type-check backend
        run: >
          python -m mypy
          app/api/v1/routes_models.py
          app/parsing/models.py
          app/parsing/vtk_parser.py
          app/tasks/parse_task.py
          tests/api/test_routes_models.py
          tests/tasks/test_parse_task.py
          tests/tasks/test_process_upload.py
          tests/parsing/test_vtu_error_handling.py

      - name: Test backend
        run: pytest tests -q

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Type-check frontend
        run: npm run typecheck

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build
